[tool:pytest]
# Pro Tier Test Configuration

# Test discovery
python_files = test_*pro*.py test_*tier*.py test_*billing*.py test_*llm*.py test_*analytics*.py
python_classes = Test*ProTier* Test*Billing* Test*LLM* Test*Analytics* Test*TierGating*
python_functions = test_*

# Minimum Python version
minversion = 3.11

# Test paths
testpaths = tests

# Required plugins
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --asyncio-mode=auto
    -ra

# Markers for Pro tier tests
markers =
    pro_tier: Tests for Pro tier functionality
    billing: Tests for Stripe billing integration  
    llm: Tests for LLM service and Phase 9 analysis
    analytics: Tests for analytics and usage tracking
    tier_gating: Tests for tier-based access control
    performance: Performance and load tests for Pro features
    integration: Integration tests requiring external services
    security: Security-focused tests for Pro features
    slow: Tests that take more than 5 seconds
    requires_redis: Tests that require Redis cache
    requires_stripe: Tests that require Stripe configuration
    requires_llm: Tests that require LLM API access

# Asyncio configuration
asyncio_mode = auto

# Coverage configuration
[coverage:run]
source = .
omit = 
    */tests/*
    */venv/*
    */__pycache__/*
    */migrations/*
    */conftest.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    class .*\(Protocol\):
    @(abc\.)?abstractmethod

show_missing = True
skip_covered = False
precision = 2

[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml