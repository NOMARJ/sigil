name: Production Migration Drift

on:
  schedule:
    - cron: "30 15 * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AZURE_RESOURCE_GROUP: sigil-rg
  API_CONTAINER_APP: sigil-api

jobs:
  verify-prod-schema:
    name: Verify production schema
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run read-only migration drift verifier
        run: |
          script -q -e -c "az containerapp exec \
            --resource-group \"$AZURE_RESOURCE_GROUP\" \
            --name \"$API_CONTAINER_APP\" \
            --command \"python -m api.migrations.apply_prod_migration --verify-only\"" \
            /dev/null
