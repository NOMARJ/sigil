name: Deploy to Azure

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "bot/**"
      - "dashboard/**"
      - "Dockerfile.bot"
      - ".github/workflows/deploy-azure.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

env:
  ACR_NAME: sigilacr46iy6y
  ACR_LOGIN_SERVER: sigilacr46iy6y.azurecr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-azure-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and Push Images to ACR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    outputs:
      api-image-tag: ${{ steps.meta.outputs.api-tag }}
      bot-image-tag: ${{ steps.meta.outputs.bot-tag }}
      dashboard-image-tag: ${{ steps.meta.outputs.dashboard-tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name ${{ env.ACR_NAME }}

      - name: Generate image tags
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "api-tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "bot-tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "dashboard-tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "API Image: ${{ env.ACR_LOGIN_SERVER }}/sigil-api:${SHORT_SHA}"
          echo "Bot Image: ${{ env.ACR_LOGIN_SERVER }}/sigil-bot:${SHORT_SHA}"
          echo "Dashboard Image: ${{ env.ACR_LOGIN_SERVER }}/sigil-dashboard:${SHORT_SHA}"

      - name: Build and push API image
        run: |
          docker buildx build \
            --file ./api/Dockerfile \
            --tag "${{ env.ACR_LOGIN_SERVER }}/sigil-api:latest" \
            --tag "${{ env.ACR_LOGIN_SERVER }}/sigil-api:${{ steps.meta.outputs.api-tag }}" \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --push \
            .

      - name: Build and push Bot image
        run: |
          docker buildx build \
            --file ./Dockerfile.bot \
            --tag "${{ env.ACR_LOGIN_SERVER }}/sigil-bot:latest" \
            --tag "${{ env.ACR_LOGIN_SERVER }}/sigil-bot:${{ steps.meta.outputs.bot-tag }}" \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --push \
            .

      - name: Build and push Dashboard image
        run: |
          docker buildx build \
            --file ./dashboard/Dockerfile \
            --tag "${{ env.ACR_LOGIN_SERVER }}/sigil-dashboard:latest" \
            --tag "${{ env.ACR_LOGIN_SERVER }}/sigil-dashboard:${{ steps.meta.outputs.dashboard-tag }}" \
            --build-arg NEXT_PUBLIC_API_URL=https://api.sigilsec.ai \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --push \
            ./dashboard

  trigger-infrastructure-deployment:
    name: Trigger Infrastructure Deployment
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Trigger sigil-infra deployment
        env:
          GH_TOKEN: ${{ secrets.INFRA_REPO_PAT }}
        run: |
          jq -nc \
            --arg source_repo "${{ github.repository }}" \
            --arg source_ref "${{ github.ref }}" \
            --arg source_sha "${{ github.sha }}" \
            --arg api_image_tag "${{ needs.build-and-push.outputs.api-image-tag }}" \
            --arg bot_image_tag "${{ needs.build-and-push.outputs.bot-image-tag }}" \
            --arg dashboard_image_tag "${{ needs.build-and-push.outputs.dashboard-image-tag }}" \
            --arg triggered_by "${{ github.actor }}" \
            --arg environment "${{ inputs.environment || 'production' }}" \
            '{
              event_type:"deploy-infrastructure",
              client_payload:{
                source_repo:$source_repo,
                source_ref:$source_ref,
                source_sha:$source_sha,
                api_image_tag:$api_image_tag,
                bot_image_tag:$bot_image_tag,
                dashboard_image_tag:$dashboard_image_tag,
                triggered_by:$triggered_by,
                environment:$environment
              }
            }' \
            | gh api repos/NOMARJ/sigil-infra/dispatches --method POST --input -

      - name: Deployment triggered
        run: |
          echo "Infrastructure deployment triggered in NOMARJ/sigil-infra"
          echo "Image tags:"
          echo "  - API: ${{ needs.build-and-push.outputs.api-image-tag }}"
          echo "  - Bot: ${{ needs.build-and-push.outputs.bot-image-tag }}"
          echo "  - Dashboard: ${{ needs.build-and-push.outputs.dashboard-image-tag }}"
