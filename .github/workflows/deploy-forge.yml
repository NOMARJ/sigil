name: Deploy Sigil Forge

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'dashboard/**'
      - 'classification-pipeline.py'
      - 'forge-schema.sql'
      - '.github/workflows/deploy-forge.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      deploy_components:
        description: 'Components to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - api-only
          - dashboard-only
          - classification-only
          - database-only

env:
  ACR_NAME: sigilacr46iy6y
  ACR_LOGIN_SERVER: sigilacr46iy6y.azurecr.io

jobs:
  
  # ============================================================================
  # PRE-DEPLOYMENT CHECKS
  # ============================================================================
  
  pre-deployment-checks:
    name: Pre-deployment Validation
    runs-on: ubuntu-latest
    outputs:
      should-deploy-api: ${{ steps.changes.outputs.api || github.event.inputs.deploy_components == 'all' || github.event.inputs.deploy_components == 'api-only' }}
      should-deploy-dashboard: ${{ steps.changes.outputs.dashboard || github.event.inputs.deploy_components == 'all' || github.event.inputs.deploy_components == 'dashboard-only' }}
      should-deploy-classification: ${{ steps.changes.outputs.classification || github.event.inputs.deploy_components == 'all' || github.event.inputs.deploy_components == 'classification-only' }}
      should-deploy-database: ${{ steps.changes.outputs.database || github.event.inputs.deploy_components == 'all' || github.event.inputs.deploy_components == 'database-only' }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 2
          
      - name: Detect changes
        id: changes
        run: |
          # Check which components have changes
          if git diff --name-only HEAD^ HEAD | grep -E '^api/' || git diff --name-only HEAD^ HEAD | grep -E 'api/routers/forge\.py'; then
            echo "api=true" >> $GITHUB_OUTPUT
          else
            echo "api=false" >> $GITHUB_OUTPUT
          fi
          
          if git diff --name-only HEAD^ HEAD | grep -E '^dashboard/'; then
            echo "dashboard=true" >> $GITHUB_OUTPUT
          else
            echo "dashboard=false" >> $GITHUB_OUTPUT
          fi
          
          if git diff --name-only HEAD^ HEAD | grep -E 'classification-pipeline\.py'; then
            echo "classification=true" >> $GITHUB_OUTPUT
          else
            echo "classification=false" >> $GITHUB_OUTPUT
          fi
          
          if git diff --name-only HEAD^ HEAD | grep -E 'forge-schema\.sql'; then
            echo "database=true" >> $GITHUB_OUTPUT
          else
            echo "database=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Validate database schema
        if: steps.changes.outputs.database == 'true'
        run: |
          echo "Validating database schema changes..."
          # Basic syntax validation for SQL
          if ! grep -q "CREATE TABLE\|ALTER TABLE\|INSERT INTO" forge-schema.sql; then
            echo "No SQL DDL statements found in forge-schema.sql"
            exit 1
          fi
          
          # Check for dangerous operations
          if grep -i "DROP\|TRUNCATE\|DELETE.*FROM.*WHERE" forge-schema.sql; then
            echo "WARNING: Destructive SQL operations detected. Manual review required."
            # Don't fail, but warn
          fi
          
      - name: Validate API endpoints
        if: steps.changes.outputs.api == 'true'
        run: |
          echo "Validating API changes..."
          # Check if forge router exists and has required endpoints
          if [ -f "api/routers/forge.py" ]; then
            if ! grep -q "router.*forge" api/routers/forge.py; then
              echo "forge.py must export a router"
              exit 1
            fi
            
            # Check for required endpoints
            required_endpoints=("search" "categories" "stacks" "feed.json")
            for endpoint in "${required_endpoints[@]}"; do
              if ! grep -q "\"/$endpoint\"" api/routers/forge.py; then
                echo "Required endpoint /$endpoint not found"
                exit 1
              fi
            done
          fi
          
      - name: Check environment variables
        run: |
          echo "Validating required environment variables..."
          
          # Check if required secrets are available (without exposing values)
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "ERROR: ANTHROPIC_API_KEY secret not configured"
            exit 1
          fi
          
          if [ -z "${{ secrets.AZURE_CREDENTIALS }}" ]; then
            echo "ERROR: AZURE_CREDENTIALS secret not configured"
            exit 1
          fi
          
          echo "Environment validation passed"

  # ============================================================================
  # DATABASE MIGRATION (IF NEEDED)
  # ============================================================================
  
  deploy-database:
    name: Deploy Database Schema
    runs-on: ubuntu-latest
    needs: pre-deployment-checks
    if: needs.pre-deployment-checks.outputs.should-deploy-database == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        
      - name: Azure Login
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302 # v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          
      - name: Backup database
        run: |
          echo "Creating database backup before schema changes..."
          # Azure SQL backup via Azure CLI
          # This would be a real backup command in production
          az sql db export \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --server ${{ secrets.AZURE_SQL_SERVER }} \
            --name ${{ secrets.AZURE_SQL_DATABASE }} \
            --storage-key-type StorageAccessKey \
            --storage-key ${{ secrets.AZURE_STORAGE_KEY }} \
            --storage-uri "https://${{ secrets.AZURE_STORAGE_ACCOUNT }}.blob.core.windows.net/backups/forge-pre-deploy-$(date +%Y%m%d-%H%M%S).bacpac" \
            --admin-user ${{ secrets.AZURE_SQL_ADMIN_USER }} \
            --admin-password ${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}
            
      - name: Apply database schema
        run: |
          echo "Applying database schema changes..."
          
          # Install sqlcmd
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          curl https://packages.microsoft.com/config/ubuntu/20.04/prod.list | sudo tee /etc/apt/sources.list.d/msprod.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools unixodbc-dev
          
          # Apply schema (idempotent operations only)
          /opt/mssql-tools/bin/sqlcmd \
            -S "${{ secrets.AZURE_SQL_SERVER }}.database.windows.net" \
            -d "${{ secrets.AZURE_SQL_DATABASE }}" \
            -U "${{ secrets.AZURE_SQL_ADMIN_USER }}" \
            -P "${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}" \
            -i forge-schema.sql \
            -o schema-deployment.log
            
          echo "Database schema deployment completed"
          cat schema-deployment.log
          
      - name: Verify schema deployment
        run: |
          echo "Verifying schema deployment..."
          
          # Check that new tables exist
          /opt/mssql-tools/bin/sqlcmd \
            -S "${{ secrets.AZURE_SQL_SERVER }}.database.windows.net" \
            -d "${{ secrets.AZURE_SQL_DATABASE }}" \
            -U "${{ secrets.AZURE_SQL_ADMIN_USER }}" \
            -P "${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}" \
            -Q "SELECT TABLE_NAME FROM INFORMATION_SCHEMA.TABLES WHERE TABLE_NAME LIKE 'forge_%'" \
            -o schema-verification.log
            
          cat schema-verification.log
          
          # Ensure required tables exist
          if ! grep -q "forge_classification" schema-verification.log; then
            echo "ERROR: forge_classification table not found"
            exit 1
          fi
          
          if ! grep -q "forge_categories" schema-verification.log; then
            echo "ERROR: forge_categories table not found"
            exit 1
          fi
          
          echo "Schema verification passed"

  # ============================================================================
  # CONTAINER BUILD AND PUSH
  # ============================================================================
  
  build-and-push:
    name: Build and Push Updated Images
    runs-on: ubuntu-latest
    needs: [pre-deployment-checks, deploy-database]
    if: always() && needs.pre-deployment-checks.result == 'success' && (needs.deploy-database.result == 'success' || needs.deploy-database.result == 'skipped')
    
    permissions:
      contents: read
      id-token: write

    outputs:
      api-image-tag: ${{ steps.meta.outputs.api-tag }}
      dashboard-image-tag: ${{ steps.meta.outputs.dashboard-tag }}
      classification-image-tag: ${{ steps.meta.outputs.classification-tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      - name: Log in to Azure
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302 # v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name ${{ env.ACR_NAME }}

      - name: Generate image tags
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          
          echo "api-tag=forge-${SHORT_SHA}-${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "dashboard-tag=forge-${SHORT_SHA}-${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "classification-tag=forge-${SHORT_SHA}-${TIMESTAMP}" >> $GITHUB_OUTPUT
          
          echo "API Image: ${{ env.ACR_LOGIN_SERVER }}/sigil-api:forge-${SHORT_SHA}-${TIMESTAMP}"
          echo "Dashboard Image: ${{ env.ACR_LOGIN_SERVER }}/sigil-dashboard:forge-${SHORT_SHA}-${TIMESTAMP}"
          echo "Classification Image: ${{ env.ACR_LOGIN_SERVER }}/sigil-classification:forge-${SHORT_SHA}-${TIMESTAMP}"

      # Build API image (with Forge routes)
      - name: Build and push API image
        if: needs.pre-deployment-checks.outputs.should-deploy-api == 'true'
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v5
        with:
          context: .
          file: ./api/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/sigil-api:latest
            ${{ env.ACR_LOGIN_SERVER }}/sigil-api:${{ steps.meta.outputs.api-tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            FORGE_ENABLED=true

      # Build Dashboard image (with Forge UI)
      - name: Build and push Dashboard image  
        if: needs.pre-deployment-checks.outputs.should-deploy-dashboard == 'true'
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v5
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/sigil-dashboard:latest
            ${{ env.ACR_LOGIN_SERVER }}/sigil-dashboard:${{ steps.meta.outputs.dashboard-tag }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.sigilsec.ai
            NEXT_PUBLIC_FORGE_ENABLED=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build Classification Pipeline image
      - name: Build and push Classification image
        if: needs.pre-deployment-checks.outputs.should-deploy-classification == 'true'
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v5
        with:
          context: .
          file: ./Dockerfile.classification
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/sigil-classification:latest
            ${{ env.ACR_LOGIN_SERVER }}/sigil-classification:${{ steps.meta.outputs.classification-tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # INFRASTRUCTURE DEPLOYMENT
  # ============================================================================
  
  deploy-infrastructure:
    name: Deploy Infrastructure
    needs: [pre-deployment-checks, build-and-push]
    runs-on: ubuntu-latest
    if: always() && needs.build-and-push.result == 'success'

    steps:
      - name: Trigger sigil-infra deployment for Forge
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0 # v3
        with:
          token: ${{ secrets.INFRA_REPO_PAT }}
          repository: NOMARJ/sigil-infra
          event-type: deploy-forge-infrastructure
          client-payload: |
            {
              "source_repo": "${{ github.repository }}",
              "source_ref": "${{ github.ref }}",
              "source_sha": "${{ github.sha }}",
              "api_image_tag": "${{ needs.build-and-push.outputs.api-image-tag }}",
              "dashboard_image_tag": "${{ needs.build-and-push.outputs.dashboard-image-tag }}",
              "classification_image_tag": "${{ needs.build-and-push.outputs.classification-image-tag }}",
              "triggered_by": "${{ github.actor }}",
              "environment": "${{ inputs.environment || 'production' }}",
              "forge_enabled": true,
              "deploy_components": {
                "api": "${{ needs.pre-deployment-checks.outputs.should-deploy-api }}",
                "dashboard": "${{ needs.pre-deployment-checks.outputs.should-deploy-dashboard }}",
                "classification": "${{ needs.pre-deployment-checks.outputs.should-deploy-classification }}"
              }
            }

      - name: Deployment details
        run: |
          echo "Forge deployment triggered in NOMARJ/sigil-infra"
          echo "Components to deploy:"
          echo "  - API: ${{ needs.pre-deployment-checks.outputs.should-deploy-api }}"
          echo "  - Dashboard: ${{ needs.pre-deployment-checks.outputs.should-deploy-dashboard }}"
          echo "  - Classification: ${{ needs.pre-deployment-checks.outputs.should-deploy-classification }}"
          echo "Image tags:"
          echo "  - API: ${{ needs.build-and-push.outputs.api-image-tag }}"
          echo "  - Dashboard: ${{ needs.build-and-push.outputs.dashboard-image-tag }}"
          echo "  - Classification: ${{ needs.build-and-push.outputs.classification-image-tag }}"

  # ============================================================================
  # POST-DEPLOYMENT VERIFICATION
  # ============================================================================
  
  post-deployment-verification:
    name: Post-deployment Verification
    needs: [deploy-infrastructure]
    runs-on: ubuntu-latest
    if: always() && needs.deploy-infrastructure.result == 'success'

    steps:
      - name: Wait for deployment to complete
        run: |
          echo "Waiting for infrastructure deployment to complete..."
          sleep 180  # Wait 3 minutes for deployment
          
      - name: Health check - API endpoints
        run: |
          echo "Checking API health..."
          
          # Check main API health
          if ! curl -f "https://api.sigilsec.ai/health"; then
            echo "ERROR: Main API health check failed"
            exit 1
          fi
          
          # Check Forge endpoints
          if ! curl -f "https://api.sigilsec.ai/api/forge/categories"; then
            echo "ERROR: Forge categories endpoint failed"
            exit 1
          fi
          
          if ! curl -f "https://api.sigilsec.ai/api/forge/stats"; then
            echo "ERROR: Forge stats endpoint failed"  
            exit 1
          fi
          
          echo "API health checks passed"
          
      - name: Health check - Dashboard
        run: |
          echo "Checking dashboard health..."
          
          # Check dashboard loads
          if ! curl -f "https://app.sigilsec.ai/" -L; then
            echo "ERROR: Dashboard health check failed"
            exit 1
          fi
          
          echo "Dashboard health check passed"
          
      - name: Verify Forge functionality
        run: |
          echo "Testing Forge functionality..."
          
          # Test search endpoint with sample query
          SEARCH_RESULT=$(curl -s "https://api.sigilsec.ai/api/forge/search?q=database&limit=1")
          
          if ! echo "$SEARCH_RESULT" | grep -q '\[' ; then
            echo "ERROR: Search endpoint returned invalid JSON"
            echo "Response: $SEARCH_RESULT"
            exit 1
          fi
          
          # Test categories endpoint
          CATEGORIES_RESULT=$(curl -s "https://api.sigilsec.ai/api/forge/categories")
          
          if ! echo "$CATEGORIES_RESULT" | grep -q 'database\|api\|code'; then
            echo "ERROR: Categories endpoint missing expected categories"
            echo "Response: $CATEGORIES_RESULT"
            exit 1
          fi
          
          echo "Forge functionality verification passed"
          
      - name: Classification pipeline check
        run: |
          echo "Checking classification pipeline..."
          
          # This would check if classification jobs are running
          # For now, we'll just verify the container exists
          # Real implementation would check Azure Container Apps Jobs
          
          echo "Classification pipeline verification completed"

  # ============================================================================
  # ROLLBACK ON FAILURE
  # ============================================================================
  
  rollback-on-failure:
    name: Rollback on Failure
    needs: [post-deployment-verification]
    runs-on: ubuntu-latest
    if: failure()

    steps:
      - name: Trigger rollback
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0 # v3
        with:
          token: ${{ secrets.INFRA_REPO_PAT }}
          repository: NOMARJ/sigil-infra
          event-type: rollback-forge-deployment
          client-payload: |
            {
              "source_repo": "${{ github.repository }}",
              "source_ref": "${{ github.ref }}",
              "source_sha": "${{ github.sha }}",
              "reason": "Post-deployment verification failed",
              "triggered_by": "${{ github.actor }}",
              "environment": "${{ inputs.environment || 'production' }}"
            }
            
      - name: Notify team of rollback
        run: |
          echo "ROLLBACK INITIATED: Forge deployment failed verification"
          echo "Reason: Post-deployment verification failed"
          echo "Commit: ${{ github.sha }}"
          echo "Environment: ${{ inputs.environment || 'production' }}"
          
          # In a real deployment, this would send Slack/Teams notifications

  # ============================================================================
  # SUCCESS NOTIFICATION
  # ============================================================================
  
  deployment-success:
    name: Deployment Success
    needs: [post-deployment-verification]
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Generate deployment summary
        run: |
          echo "🎉 FORGE DEPLOYMENT SUCCESSFUL"
          echo "================================"
          echo "Commit: ${{ github.sha }}"
          echo "Environment: ${{ inputs.environment || 'production' }}"
          echo "Deploy time: $(date)"
          echo ""
          echo "🔗 Services:"
          echo "   - Forge API: https://api.sigilsec.ai/api/forge/"
          echo "   - Forge Web: https://forge.sigilsec.ai"
          echo "   - API Docs: https://api.sigilsec.ai/docs"
          echo ""
          echo "📊 Quick checks:"
          echo "   - Search: curl https://api.sigilsec.ai/api/forge/search?q=database"
          echo "   - Categories: curl https://api.sigilsec.ai/api/forge/categories"
          echo "   - Stats: curl https://api.sigilsec.ai/api/forge/stats"
          
      - name: Update deployment status
        run: |
          echo "forge_deployment_status=success" >> $GITHUB_ENV
          echo "forge_deployment_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV
          
          # In production, this would update a status dashboard
          
  # ============================================================================
  # CLEANUP
  # ============================================================================
  
  cleanup:
    name: Cleanup
    needs: [deployment-success, rollback-on-failure]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Clean up old container images
        run: |
          echo "Cleaning up old container images..."
          
          # Keep only the 5 most recent images for each component
          # This would be implemented with Azure CLI commands
          
          echo "Cleanup completed"