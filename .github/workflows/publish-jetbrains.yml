name: Publish JetBrains Plugin

on:
  push:
    tags:
      - "jetbrains-v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Plugin version to publish (e.g., 0.1.0)"
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-publish:
    name: Build and Publish to JetBrains Marketplace
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: plugins/jetbrains

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/jetbrains-v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing JetBrains plugin version: ${VERSION}"

      - name: Build and publish plugin
        env:
          PUBLISH_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.JETBRAINS_CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.JETBRAINS_PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.JETBRAINS_PRIVATE_KEY_PASSWORD }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ./gradlew --no-daemon -PpluginVersion="${VERSION}" buildPlugin publishPlugin

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v6
        with:
          name: sigil-jetbrains-${{ steps.version.outputs.version }}.zip
          path: plugins/jetbrains/build/distributions/*.zip
          retention-days: 90

  create-release:
    name: Create GitHub Release
    if: github.event_name == 'push'
    needs: build-and-publish
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/jetbrains-v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download ZIP artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run download "$GITHUB_RUN_ID" --name "sigil-jetbrains-${{ steps.version.outputs.version }}.zip" --dir jetbrains-release

      - name: Write release notes
        run: |
          cat > release-notes.md <<'EOF'
          # Sigil JetBrains Plugin v${{ steps.version.outputs.version }}

          Published to JetBrains Marketplace as **dev.nomark.sigil**.

          ## Installation

          ### From JetBrains Marketplace (recommended)

          Open **Settings > Plugins > Marketplace**, search for **Sigil**, then install.

          ### From ZIP (manual)

          Download the attached ZIP and install via:
          **Settings > Plugins > ⚙ > Install Plugin from Disk...**

          ## Compatibility

          IntelliJ IDEA, WebStorm, PyCharm, GoLand and other JetBrains IDEs on 2024.1+.
          EOF

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: jetbrains-v${{ steps.version.outputs.version }}
          RELEASE_NAME: Sigil JetBrains Plugin v${{ steps.version.outputs.version }}
        run: |
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_NAME}" \
              --notes-file release-notes.md \
              --draft=false \
              --prerelease=false
          else
            gh release create "${TAG_NAME}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_NAME}" \
              --notes-file release-notes.md
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: jetbrains-v${{ steps.version.outputs.version }}
        run: gh release upload "${TAG_NAME}" jetbrains-release/*.zip --clobber
