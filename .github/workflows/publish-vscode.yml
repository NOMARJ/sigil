name: Publish VS Code Extension

on:
  push:
    tags:
      - "vscode-v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Extension version to publish (e.g., 1.0.5)"
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-publish:
    name: Build and Publish to VS Code Marketplace
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: plugins/vscode

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/vscode-v}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Publishing VS Code extension version: ${VERSION}"

      - name: Update package version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          npm pkg set version="${VERSION}"

      - name: Install dependencies
        run: npm install

      - name: Compile TypeScript
        run: npm run compile

      - name: Package extension
        run: npx vsce package

      - name: Publish to VS Code Marketplace
        run: |
          VSIX_FILE="$(find . -maxdepth 1 -name '*.vsix' -print -quit)"
          npx vsce publish --packagePath "${VSIX_FILE}" --pat "${{ secrets.VSCE_PAT }}"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v6
        with:
          name: sigil-security-${{ steps.version.outputs.version }}.vsix
          path: plugins/vscode/*.vsix
          retention-days: 90

  create-release:
    name: Create GitHub Release
    needs: build-and-publish
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/vscode-v}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Download VSIX artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run download "$GITHUB_RUN_ID" --name "sigil-security-${{ steps.version.outputs.version }}.vsix" --dir vsix-release

      - name: Write release notes
        run: |
          cat > release-notes.md <<'EOF'
          # Sigil Security — VS Code Extension v${{ steps.version.outputs.version }}

          Automated security auditing for AI agent code, right in your editor.

          ## Installation

          ### From VS Code Marketplace (recommended)

          Search for **"Sigil"** in the VS Code Extensions panel, or install via:

          ```bash
          code --install-extension nomark.sigil-security
          ```

          Or visit the [VS Code Marketplace listing](https://marketplace.visualstudio.com/items?itemName=nomark.sigil-security).

          ### From VSIX (manual)

          ```bash
          code --install-extension sigil-security-${{ steps.version.outputs.version }}.vsix
          ```

          ## Prerequisites

          Sigil CLI must be installed and available on your `PATH`:

          ```bash
          # Homebrew
          brew install nomarj/tap/sigil

          # npm
          npm install -g @nomarj/sigil

          # Or from source
          cargo build --release -p sigil
          sudo cp cli/target/release/sigil /usr/local/bin/
          ```

          ## Documentation

          - [Extension README](https://github.com/NOMARJ/sigil/blob/main/plugins/vscode/README.md)
          - [Sigil Documentation](https://github.com/NOMARJ/sigil)
          EOF

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: vscode-v${{ steps.version.outputs.version }}
          RELEASE_NAME: Sigil VS Code Extension v${{ steps.version.outputs.version }}
        run: |
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_NAME}" \
              --notes-file release-notes.md \
              --draft=false \
              --prerelease=false
          else
            gh release create "${TAG_NAME}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_NAME}" \
              --notes-file release-notes.md
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: vscode-v${{ steps.version.outputs.version }}
        run: gh release upload "${TAG_NAME}" vsix-release/*.vsix --clobber
