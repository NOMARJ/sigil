name: Docker Build and Push

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Immutable tag to publish for manual runs. Defaults to sha-<short SHA>."
        required: false
        type: string

env:
  REGISTRY: docker.io
  CLI_IMAGE_NAME: nomark/sigil
  FULL_IMAGE_NAME: nomark/sigil-full
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-cli:
    name: Build CLI Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate immutable image tag
        id: image-tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            IMAGE_TAG="${{ inputs.image_tag }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            IMAGE_TAG="${GITHUB_REF_NAME#v}"
          else
            IMAGE_TAG="sha-${GITHUB_SHA::7}"
          fi
          case "$IMAGE_TAG" in
            latest|""|*:*)
              echo "::error::Docker image tag must be immutable and must not be latest"
              exit 1
              ;;
          esac
          echo "image-tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push CLI image
        env:
          IMAGE_TAG: ${{ steps.image-tag.outputs.image-tag }}
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file ./Dockerfile.cli \
            --tag "${{ env.REGISTRY }}/${{ env.CLI_IMAGE_NAME }}:${IMAGE_TAG}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --build-arg NEXT_PUBLIC_API_URL=https://api.sigilsec.ai \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --push \
            .

  build-full:
    name: Build Full Docker Image (API + Dashboard + CLI)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate immutable image tag
        id: image-tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            IMAGE_TAG="${{ inputs.image_tag }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            IMAGE_TAG="${GITHUB_REF_NAME#v}"
          else
            IMAGE_TAG="sha-${GITHUB_SHA::7}"
          fi
          case "$IMAGE_TAG" in
            latest|""|*:*)
              echo "::error::Docker image tag must be immutable and must not be latest"
              exit 1
              ;;
          esac
          echo "image-tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push full image
        env:
          IMAGE_TAG: ${{ steps.image-tag.outputs.image-tag }}
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file ./Dockerfile \
            --tag "${{ env.REGISTRY }}/${{ env.FULL_IMAGE_NAME }}:${IMAGE_TAG}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --push \
            .

  test-images:
    name: Test Docker Images
    needs: [build-cli, build-full]
    runs-on: ubuntu-latest

    strategy:
      matrix:
        image: [nomark/sigil, nomark/sigil-full]

    steps:
      - name: Pull and test image
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            IMAGE_TAG="${{ inputs.image_tag }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            IMAGE_TAG="${GITHUB_REF_NAME#v}"
          else
            IMAGE_TAG="sha-${GITHUB_SHA::7}"
          fi

          docker pull ${{ matrix.image }}:${IMAGE_TAG}
          if [ "${{ matrix.image }}" = "nomark/sigil-full" ]; then
            docker run --rm --entrypoint /usr/local/bin/sigil ${{ matrix.image }}:${IMAGE_TAG} --version
          else
            docker run --rm ${{ matrix.image }}:${IMAGE_TAG} --version
          fi
          echo "✅ ${{ matrix.image }}:${IMAGE_TAG} works!"
