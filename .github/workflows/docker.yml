name: Docker Build and Push

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

env:
  REGISTRY: docker.io
  CLI_IMAGE_NAME: nomark/sigil
  FULL_IMAGE_NAME: nomark/sigil-full
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-cli:
    name: Build CLI Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.CLI_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push CLI image
        env:
          DOCKER_TAGS: ${{ steps.meta.outputs.tags }}
          DOCKER_LABELS: ${{ steps.meta.outputs.labels }}
        run: |
          build_args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && build_args+=(--tag "$tag")
          done <<< "$DOCKER_TAGS"
          while IFS= read -r label; do
            [ -n "$label" ] && build_args+=(--label "$label")
          done <<< "$DOCKER_LABELS"

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file ./Dockerfile.cli \
            --build-arg NEXT_PUBLIC_API_URL=https://api.sigilsec.ai \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --push \
            "${build_args[@]}" \
            .

  build-full:
    name: Build Full Docker Image (API + Dashboard + CLI)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.FULL_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push full image
        env:
          DOCKER_TAGS: ${{ steps.meta.outputs.tags }}
          DOCKER_LABELS: ${{ steps.meta.outputs.labels }}
        run: |
          build_args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && build_args+=(--tag "$tag")
          done <<< "$DOCKER_TAGS"
          while IFS= read -r label; do
            [ -n "$label" ] && build_args+=(--label "$label")
          done <<< "$DOCKER_LABELS"

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file ./Dockerfile \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --push \
            "${build_args[@]}" \
            .

  test-images:
    name: Test Docker Images
    needs: [build-cli, build-full]
    runs-on: ubuntu-latest

    strategy:
      matrix:
        image: [nomark/sigil, nomark/sigil-full]

    steps:
      - name: Pull and test image
        run: |
          docker pull ${{ matrix.image }}:latest
          if [ "${{ matrix.image }}" = "nomark/sigil-full" ]; then
            docker run --rm --entrypoint /usr/local/bin/sigil ${{ matrix.image }}:latest --version
          else
            docker run --rm ${{ matrix.image }}:latest --version
          fi
          echo "✅ ${{ matrix.image }} works!"
