# Sigil Forge Monitoring and Observability Configuration
# Azure Application Insights + Custom Dashboards

# ============================================================================
# AZURE APPLICATION INSIGHTS CONFIGURATION
# ============================================================================

azure_application_insights:
  connection_string: "${APPLICATIONINSIGHTS_CONNECTION_STRING}"
  
  # Custom events for Forge tracking
  custom_events:
    - name: "forge_search_performed"
      properties:
        - query
        - ecosystem
        - result_count
        - user_agent_type  # human, agent, bot
        - response_time_ms
        
    - name: "forge_package_viewed"
      properties:
        - package_name
        - ecosystem
        - category
        - trust_score
        - referrer_type
        
    - name: "forge_stack_accessed"
      properties:
        - stack_name
        - use_case
        - component_count
        - avg_trust_score
        
    - name: "forge_classification_completed"
      properties:
        - package_name
        - ecosystem
        - confidence_score
        - classification_time_ms
        - classifier_version
        
    - name: "forge_api_request"
      properties:
        - endpoint
        - method
        - status_code
        - response_time_ms
        - rate_limit_hit

  # Performance counters
  performance_counters:
    - name: "forge_search_latency"
      metric: "response_time"
      aggregation: "avg"
      
    - name: "forge_classification_throughput"
      metric: "packages_per_minute"
      aggregation: "count"
      
    - name: "forge_api_errors"
      metric: "error_rate"
      aggregation: "percentage"

# ============================================================================
# CUSTOM METRICS AND ALERTS
# ============================================================================

custom_metrics:
  
  # Business metrics
  - name: "forge_daily_active_users"
    query: |
      customEvents
      | where name in ("forge_search_performed", "forge_package_viewed")
      | where timestamp > ago(24h)
      | summarize dcount(client_IP) by bin(timestamp, 1h)
    alert_threshold: "< 10"  # Less than 10 DAU
    
  - name: "forge_agent_vs_human_usage"
    query: |
      customEvents
      | where name == "forge_search_performed"
      | where timestamp > ago(24h)
      | extend user_type = case(
          customDimensions.user_agent_type == "agent", "agent",
          customDimensions.user_agent_type == "bot", "bot", 
          "human")
      | summarize count() by user_type
    
  # Quality metrics
  - name: "forge_classification_accuracy"
    query: |
      customEvents
      | where name == "forge_classification_completed"
      | where timestamp > ago(24h)
      | summarize 
          avg_confidence = avg(todouble(customDimensions.confidence_score)),
          low_confidence_count = countif(todouble(customDimensions.confidence_score) < 0.7)
    alert_threshold: "avg_confidence < 0.8"
    
  - name: "forge_search_success_rate"
    query: |
      customEvents
      | where name == "forge_search_performed"
      | where timestamp > ago(1h)
      | summarize 
          total_searches = count(),
          zero_result_searches = countif(toint(customDimensions.result_count) == 0)
      | extend success_rate = (total_searches - zero_result_searches) * 100.0 / total_searches
    alert_threshold: "success_rate < 85"
    
  # Performance metrics  
  - name: "forge_api_latency_p95"
    query: |
      customEvents
      | where name == "forge_api_request"
      | where timestamp > ago(15m)
      | summarize p95_latency = percentile(todouble(customDimensions.response_time_ms), 95)
    alert_threshold: "p95_latency > 2000"  # > 2 seconds
    
  - name: "forge_classification_pipeline_health"
    query: |
      customEvents
      | where name == "forge_classification_completed"
      | where timestamp > ago(1h)
      | summarize 
          packages_classified = count(),
          avg_processing_time = avg(todouble(customDimensions.classification_time_ms))
    alert_threshold: "packages_classified < 10"  # Less than 10/hour

# ============================================================================
# AZURE MONITOR ALERTS
# ============================================================================

azure_alerts:
  
  # Critical alerts (immediate notification)
  - name: "forge_api_down"
    severity: "Critical"
    condition: |
      requests
      | where url contains "/api/forge/"
      | where timestamp > ago(5m)
      | where success == false
      | summarize failure_rate = (count() * 100.0) / 100
    threshold: "failure_rate > 50"
    notification: ["email", "sms", "slack"]
    
  - name: "forge_database_connection_failure"
    severity: "Critical" 
    condition: |
      exceptions
      | where timestamp > ago(5m)
      | where details contains "database" or details contains "connection"
      | where problemId contains "forge"
    threshold: "count > 0"
    notification: ["email", "sms"]
    
  # Warning alerts (email notification)
  - name: "forge_high_error_rate"
    severity: "Warning"
    condition: |
      requests
      | where url contains "/api/forge/"
      | where timestamp > ago(15m)
      | summarize error_rate = (countif(success == false) * 100.0) / count()
    threshold: "error_rate > 10"
    notification: ["email"]
    
  - name: "forge_llm_classification_budget_warning"
    severity: "Warning"
    condition: |
      customEvents
      | where name == "forge_classification_completed"
      | where timestamp > ago(24h)
      | summarize daily_classifications = count()
    threshold: "daily_classifications > 1000"  # Approaching budget limit
    notification: ["email", "slack"]
    
  - name: "forge_rate_limit_exceeded"
    severity: "Info"
    condition: |
      customEvents
      | where name == "forge_api_request"
      | where timestamp > ago(15m)
      | where customDimensions.rate_limit_hit == "true"
      | summarize rate_limit_hits = count()
    threshold: "rate_limit_hits > 50"
    notification: ["slack"]

# ============================================================================
# CUSTOM DASHBOARDS
# ============================================================================

dashboards:
  
  # Executive dashboard
  - name: "Forge Executive Dashboard"
    widgets:
      
      - type: "kpi_tiles"
        tiles:
          - title: "Daily Active Users"
            query: |
              customEvents
              | where name in ("forge_search_performed", "forge_package_viewed")
              | where timestamp > ago(24h)
              | summarize dau = dcount(client_IP)
            
          - title: "Total Packages Classified"
            query: |
              customEvents
              | where name == "forge_classification_completed"
              | summarize total = count()
              
          - title: "API Success Rate"
            query: |
              requests
              | where url contains "/api/forge/"
              | where timestamp > ago(24h)
              | summarize success_rate = (countif(success) * 100.0) / count()
              
          - title: "Weekly Revenue (Projected)"
            query: |
              // This would connect to billing events when implemented
              print projected_weekly_revenue = 125  // $25/week * 5 customers
      
      - type: "line_chart"
        title: "Forge Usage Growth"
        query: |
          customEvents
          | where name in ("forge_search_performed", "forge_package_viewed")
          | where timestamp > ago(30d)
          | summarize daily_requests = count() by bin(timestamp, 1d)
          | sort by timestamp asc
          
      - type: "pie_chart"
        title: "Usage by Ecosystem"
        query: |
          customEvents
          | where name == "forge_search_performed"
          | where timestamp > ago(7d)
          | extend ecosystem = tostring(customDimensions.ecosystem)
          | where ecosystem != ""
          | summarize searches = count() by ecosystem
          
      - type: "bar_chart"  
        title: "Top Package Categories"
        query: |
          customEvents
          | where name == "forge_package_viewed"
          | where timestamp > ago(7d)
          | extend category = tostring(customDimensions.category)
          | summarize views = count() by category
          | top 10 by views

  # Operations dashboard
  - name: "Forge Operations Dashboard"
    widgets:
    
      - type: "line_chart"
        title: "API Response Times (P95)"
        query: |
          customEvents
          | where name == "forge_api_request"
          | where timestamp > ago(24h)
          | summarize 
              p95_latency = percentile(todouble(customDimensions.response_time_ms), 95),
              p50_latency = percentile(todouble(customDimensions.response_time_ms), 50)
              by bin(timestamp, 15m)
              
      - type: "table"
        title: "Classification Pipeline Status"
        query: |
          customEvents
          | where name == "forge_classification_completed"
          | where timestamp > ago(2h)
          | summarize 
              packages = count(),
              avg_confidence = round(avg(todouble(customDimensions.confidence_score)), 2),
              avg_time_ms = round(avg(todouble(customDimensions.classification_time_ms)), 0)
              by bin(timestamp, 30m)
          | sort by timestamp desc
          
      - type: "heatmap"
        title: "Search Patterns by Hour"
        query: |
          customEvents
          | where name == "forge_search_performed"
          | where timestamp > ago(7d)
          | extend hour = hourofday(timestamp), day = dayofweek(timestamp)
          | summarize search_count = count() by hour, day
          
      - type: "error_log"
        title: "Recent Errors"
        query: |
          exceptions
          | where timestamp > ago(1h)
          | where operation_Name contains "forge"
          | project timestamp, operation_Name, problemId, details
          | sort by timestamp desc
          | take 20

  # Product dashboard  
  - name: "Forge Product Analytics"
    widgets:
    
      - type: "funnel_chart"
        title: "Discovery Funnel"
        query: |
          customEvents
          | where timestamp > ago(7d)
          | where name in ("forge_search_performed", "forge_package_viewed", "forge_stack_accessed")
          | summarize count() by name
          | sort by count_ desc
          
      - type: "cohort_analysis" 
        title: "User Retention"
        query: |
          customEvents
          | where name in ("forge_search_performed", "forge_package_viewed")
          | where timestamp > ago(30d)
          | extend user_id = client_IP  // Proxy for user
          | summarize first_visit = min(timestamp) by user_id
          | join kind=inner (
              customEvents
              | where name in ("forge_search_performed", "forge_package_viewed")
              | where timestamp > ago(30d)
              | summarize return_visits = count() by client_IP
          ) on $left.user_id == $right.client_IP
          | extend days_since_first = datetime_diff('day', first_visit, now())
          | summarize returning_users = countif(return_visits > 1) by days_since_first
          
      - type: "word_cloud"
        title: "Popular Search Terms"
        query: |
          customEvents
          | where name == "forge_search_performed"
          | where timestamp > ago(7d)
          | extend query_text = tostring(customDimensions.query)
          | summarize search_count = count() by query_text
          | top 50 by search_count

# ============================================================================
# COST MONITORING
# ============================================================================

cost_monitoring:
  
  # LLM usage tracking
  anthropic_api_costs:
    - metric: "forge_llm_requests_daily"
      query: |
        customEvents
        | where name == "forge_classification_completed"
        | where timestamp > ago(24h)
        | summarize daily_requests = count()
      cost_per_request: 0.001  # $0.001 per Haiku request
      budget_alert_threshold: 25.00  # Alert when approaching $25/day
      
  # Infrastructure costs
  azure_costs:
    - resource: "Container Apps"
      baseline_monthly: 0  # Included in existing plan
      
    - resource: "Application Insights"
      data_ingestion_gb_per_month: 1.0  # Estimated
      cost_per_gb: 2.76
      
    - resource: "Azure SQL Database"
      baseline_monthly: 0  # Using existing database
      
  # Revenue tracking
  revenue_metrics:
    - name: "forge_monthly_revenue"
      sources:
        - featured_listings: 0  # To be implemented
        - forge_pro_subscriptions: 0  # Future feature
        - api_usage_plans: 0  # Future feature
      target_monthly: 500  # $500/month target

# ============================================================================
# ALERTING RULES
# ============================================================================

alert_rules:
  
  # SLA monitoring
  - name: "forge_sla_breach"
    sla_target: 99.9  # 99.9% uptime
    measurement_window: "24h"
    condition: |
      requests
      | where url contains "/api/forge/"
      | where timestamp > ago(24h)
      | summarize availability = (countif(success) * 100.0) / count()
    action: "page_on_call_engineer"
    
  # User experience
  - name: "forge_user_experience_degradation"
    condition: |
      customEvents
      | where name == "forge_search_performed"
      | where timestamp > ago(30m)
      | where todouble(customDimensions.response_time_ms) > 3000
      | summarize slow_searches = count()
    threshold: "slow_searches > 10"
    action: "investigate_performance"
    
  # Business metrics
  - name: "forge_zero_usage_alert"
    condition: |
      customEvents
      | where name in ("forge_search_performed", "forge_package_viewed")
      | where timestamp > ago(2h)
      | summarize total_events = count()
    threshold: "total_events == 0"
    action: "check_service_health"

# ============================================================================
# RUNBOOK INTEGRATION
# ============================================================================

runbooks:
  
  - alert: "forge_api_down"
    runbook_url: "https://internal.docs.com/forge-api-down-runbook"
    steps:
      1. "Check Azure Container Apps status"
      2. "Verify database connectivity" 
      3. "Check rate limiting configuration"
      4. "Review recent deployments"
      5. "Escalate to development team if needed"
      
  - alert: "forge_llm_classification_budget_warning"
    runbook_url: "https://internal.docs.com/forge-cost-management"
    steps:
      1. "Review classification batch size settings"
      2. "Check for unexpected usage spikes"
      3. "Consider temporarily pausing classification"
      4. "Adjust budget alerts if within expectations"
      
  - alert: "forge_classification_accuracy"
    runbook_url: "https://internal.docs.com/forge-classification-quality"
    steps:
      1. "Review recent classification results"
      2. "Check Claude API response quality"
      3. "Validate input data quality"
      4. "Consider retraining classification prompts"